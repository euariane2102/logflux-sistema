<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogFlux — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #2F80ED;
      --blue-light: #4AA3FF;
      --teal: #3FD0C9;
      --verde: #23D18B;
      --texto: #1a1a1a;
      --branco: #ffffff;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f1419 0%, #1a2333 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: linear-gradient(135deg, rgba(47, 128, 237, 0.05) 0%, rgba(63, 208, 201, 0.05) 100%);
      border: 1px solid rgba(63, 208, 201, 0.2);
      border-radius: 16px;
      padding: 48px;
      max-width: 420px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo svg {
      width: 40px;
      height: 40px;
      fill: var(--teal);
    }

    .logo-text {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
    }

    .login-title {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(63, 208, 201, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s, background 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--teal);
      background: rgba(255, 255, 255, 0.08);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--verde) 0%, #1cc96d 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13.5px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(35, 209, 139, 0.4);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      background: rgba(255, 71, 87, 0.15);
      border: 1px solid rgba(255, 71, 87, 0.3);
      color: #FF6B7A;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      background: rgba(35, 209, 139, 0.15);
      border: 1px solid rgba(35, 209, 139, 0.3);
      color: var(--verde);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(63, 208, 201, 0.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .form-footer a {
      color: var(--teal);
      text-decoration: none;
      transition: color 0.3s;
    }

    .form-footer a:hover {
      color: var(--verde);
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 32px;
      }

      .login-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 12h12m-6-6v12M3 3h18a2 2 0 012 2v14a2 2 0 01-2 2H3a2 2 0 01-2-2V5a2 2 0 012-2z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">LogFlux</span>
      </div>
      <h1 class="login-title">Bem-vindo</h1>
      <p class="login-subtitle">Acesse sua conta para continuar</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="error" id="errorMsg"></div>
      <div class="success" id="successMsg"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        Entrar
      </button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span style="color: rgba(255,255,255,0.6);">Autenticando...</span>
      </div>
    </form>

    <div class="form-footer">
      Precisa de ajuda? Contate <a href="mailto:admin@logflux.com">admin@logflux.com</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://cizpxkjzvfyewnlqhjzf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpenB4a2p6dmZ5ZXducWhqemYiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczNDI4OTI2MiwiZXhwIjoxNzMxNjk3MjYyfQ.vw-XY9gNjQqVNCpXKBwqJ-A0gVKCWYaIQHo3cMH9b7g';

    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const loginBtn = document.getElementById('loginBtn');
      const loading = document.getElementById('loading');

      // Limpar mensagens
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      // Mostrar loading
      loginBtn.style.display = 'none';
      loading.style.display = 'block';

      try {
        // Autenticar com Supabase
        const response = await fetch(
          `${SUPABASE_URL}/auth/v1/token?grant_type=password`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY
            },
            body: JSON.stringify({
              email: email,
              password: password
            })
          }
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error_description || 'Email ou senha incorretos');
        }

        // Salvar token e informações do usuário
        localStorage.setItem('supabase_token', data.access_token);
        localStorage.setItem('user_id', data.user.id);
        localStorage.setItem('user_email', data.user.email);

        // Mostrar sucesso
        successMsg.textContent = 'Login realizado com sucesso! Redirecionando...';
        successMsg.classList.add('show');

        // Redirecionar após 1.5s
        setTimeout(() => {
          window.location.href = '/logflux-cliente.html';
        }, 1500);

      } catch (error) {
        console.error('Erro no login:', error);
        errorMsg.textContent = error.message || 'Erro ao fazer login. Tente novamente.';
        errorMsg.classList.add('show');

        // Voltar ao estado normal
        loginBtn.style.display = 'block';
        loading.style.display = 'none';
      }
    }

    // Verificar se já está logado
    window.addEventListener('load', () => {
      const token = localStorage.getItem('supabase_token');
      if (token) {
        window.location.href = '/logflux-cliente.html';
      }
    });
  </script>
</body>
</html>
